<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuizaTeca — Sistema de Biblioteca</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/screens.css">
    <link rel="stylesheet" href="css/stats.css">
</head>

<body>
    <canvas id="threeCanvas" class="three-bg"></canvas>
    <div class="app-wrapper">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand" onclick="mostrarTela('menuScreen')">
                <span class="brand-logo-short">LT</span>
                <span class="brand-logo-full">LuizaTeca</span>
            </div>
            
            <div class="sidebar-nav" id="sidebarNav" style="display:none;">
                <!-- All items including nav, theme, profile and logout will be here -->
            </div>
        </aside>

        <div class="container" id="appContainer">
            <!-- As telas (screens) serão injetadas aqui pelo loader modular -->
            <div class="loading-full">
                <span class="spinner"></span>
                <p>Iniciando LuizaTeca...</p>
            </div>
        </div>
    </div>

    <!-- Container para Modais Modularizados -->
    <div id="modalsContainer"></div>

    <div id="alertContainer"></div>

    <!-- Bibliotecas Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Módulos de Lógica -->
    <script src="js/animations.js"></script>
    <script src="js/core.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/livros.js"></script>
    <script src="js/acervoDigital.js"></script>
    <script src="js/alugueis.js"></script>
    <script src="js/usuarios.js"></script>
    <script src="js/perfil.js"></script>
    <script src="js/stats.js"></script>

    <script>
        // Inicia o processo de restauração que carrega os parciais e a sessão
        window.addEventListener('DOMContentLoaded', () => {
            restaurarSessao();
        });
    </script>
</body>

</html>
